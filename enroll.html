            syncDraftFromDOM() {
                const type = this.state.editorDraft.type;
                
                const titleEl = document.getElementById('edit-title');
                if (titleEl) titleEl.oninput = (e) => this.state.editorDraft.title = e.target.value;

                const deadlineEl = document.getElementById('edit-deadline');
                if (deadlineEl) {
                    deadlineEl.oninput = (e) => {
                        let val = e.target.value;
                        if (val) {
                            const parts = val.split(':');
                            if (parts.length === 2) {
                                val += ':00';
                            } else if (parts.length === 3) {
                                parts[2] = '00';
                                val = parts.join(':');
                            }
                        }
                        this.state.editorDraft.deadline = val;
                    };
                }

                if (type === 'live_polling') {
                    this.syncPollDraftFromDOM();
                } else if (type === 'word_cloud') {
                    this.syncWordCloudDraftFromDOM();
                } else if (type === 'qa') {
                    this.syncQADraftFromDOM();
                } else if (type === 'ranking') {
                    this.syncRankingDraftFromDOM();
                }
            },

            syncPollDraftFromDOM() {
                const draft = this.state.editorDraft;
                const multiEl = document.getElementById('edit-multiple');
                const multiSettings = document.getElementById('edit-multi-settings');
                const minSelEl = document.getElementById('edit-min-selections');
                const maxSelEl = document.getElementById('edit-max-selections');

                if (multiEl) {
                    multiEl.onchange = (e) => {
                        draft.allowMultiple = e.target.checked;
                        if (multiSettings) {
                            multiSettings.style.display = e.target.checked ? 'flex' : 'none';
                        }
                    };
                }

                if (minSelEl) {
                    minSelEl.oninput = (e) => {
                        let val = parseInt(e.target.value);
                        if (isNaN(val) || val < 1) val = 1;
                        draft.minSelections = val;
                    }
                }

                if (maxSelEl) {
                    maxSelEl.oninput = (e) => {
                        let val = parseInt(e.target.value);
                        if (isNaN(val) || val < 1) val = 1;
                        draft.maxSelections = val;
                    }
                }

                const optInputs = document.querySelectorAll('.opt-input');
                optInputs.forEach((input, index) => {
                    input.oninput = (e) => {
                        draft.options[index].text = e.target.value;
                    };
                });
            },

            syncWordCloudDraftFromDOM() {
                const draft = this.state.editorDraft;
                const maxWordsEl = document.getElementById('edit-max-words');
                const minLengthEl = document.getElementById('edit-min-word-length');

                if (maxWordsEl) {
                    maxWordsEl.oninput = (e) => {
                        let val = parseInt(e.target.value);
                        if (isNaN(val) || val < 5) val = 5;
                        if (!draft.wordCloudConfig) draft.wordCloudConfig = {};
                        draft.wordCloudConfig.maxWords = val;
                    };
                }

                if (minLengthEl) {
                    minLengthEl.oninput = (e) => {
                        let val = parseInt(e.target.value);
                        if (isNaN(val) || val < 1) val = 1;
                        if (!draft.wordCloudConfig) draft.wordCloudConfig = {};
                        draft.wordCloudConfig.minWordLength = val;
                    };
                }
            },

            syncQADraftFromDOM() {
                const draft = this.state.editorDraft;
                const anonymousEl = document.getElementById('edit-allow-anonymous');
                const upvoteEl = document.getElementById('edit-allow-upvote');

                if (anonymousEl) {
                    anonymousEl.onchange = (e) => {
                        if (!draft.qaConfig) draft.qaConfig = {};
                        draft.qaConfig.allowAnonymous = e.target.checked;
                    };
                }

                if (upvoteEl) {
                    upvoteEl.onchange = (e) => {
                        if (!draft.qaConfig) draft.qaConfig = {};
                        draft.qaConfig.allowUpvote = e.target.checked;
                    };
                }
            },

            syncRankingDraftFromDOM() {
                const draft = this.state.editorDraft;
            },

            setRankingMode(mode) {
                if (!this.state.editorDraft.rankingConfig) {
                    this.state.editorDraft.rankingConfig = { mode: 'ranking', scaleMin: 1, scaleMax: 5, scaleLabels: { 1: '非常不同意', 2: '不同意', 3: '一般', 4: '同意', 5: '非常同意' }, items: [{ id: 'item_1', text: '' }, { id: 'item_2', text: '' }] };
                }
                this.state.editorDraft.rankingConfig.mode = mode;
                this.renderEditorForm();
            },

            updateScaleConfig(type, value) {
                if (!this.state.editorDraft.rankingConfig) return;
                const val = parseInt(value);
                if (type === 'min') {
                    this.state.editorDraft.rankingConfig.scaleMin = isNaN(val) ? 1 : Math.max(0, val);
                } else if (type === 'max') {
                    this.state.editorDraft.rankingConfig.scaleMax = isNaN(val) ? 5 : Math.min(10, Math.max(1, val));
                }
            },

            updateScaleLabel(scale, value) {
                if (!this.state.editorDraft.rankingConfig) return;
                if (!this.state.editorDraft.rankingConfig.scaleLabels) {
                    this.state.editorDraft.rankingConfig.scaleLabels = {};
                }
                this.state.editorDraft.rankingConfig.scaleLabels[scale] = value;
            },

            addRankingItem() {
                if (!this.state.editorDraft.rankingConfig) {
                    this.state.editorDraft.rankingConfig = { mode: 'ranking', scaleMin: 1, scaleMax: 5, scaleLabels: { 1: '非常不同意', 2: '不同意', 3: '一般', 4: '同意', 5: '非常同意' }, items: [] };
                }
                this.state.editorDraft.rankingConfig.items.push({ id: `item_${Date.now()}`, text: '' });
                this.renderEditorForm();
            },

            deleteRankingItem(itemId) {
                if (!this.state.editorDraft.rankingConfig || !this.state.editorDraft.rankingConfig.items) return;
                this.state.editorDraft.rankingConfig.items = this.state.editorDraft.rankingConfig.items.filter(i => i.id !== itemId);
                this.renderEditorForm();
            },

            updateRankingItemText(index, value) {
                if (!this.state.editorDraft.rankingConfig || !this.state.editorDraft.rankingConfig.items) return;
                if (this.state.editorDraft.rankingConfig.items[index]) {
                    this.state.editorDraft.rankingConfig.items[index].text = value;
                }
            },

            addOption() {
                this.state.editorDraft.options.push({ id: `opt_${Date.now()}`, text: '' });
                this.renderEditorForm();
            },

            deleteOption(id) {
                if (this.state.editorDraft.options.length <= 2) return;
                this.state.editorDraft.options = this.state.editorDraft.options.filter(o => o.id !== id);
                this.renderEditorForm();
            },

            removeImage(id) {
                const opt = this.state.editorDraft.options.find(o => o.id === id);
                if (opt) opt.imageUrl = '';
                this.renderEditorForm();
            },

            setLayout(layout) {
                this.state.editorDraft.layout = layout;
                this.renderEditorForm();
            },

            async handleImageUpload(e) {
                const file = e.target.files[0];
                if (!file) return;

                const optId = this.state.uploadingOptId;
                if (!optId) return;

                this.state.uploadingMap[optId] = true;
                this.renderEditorForm();

                try {
                    const cdnUrl = await uploadToCDN(file);
                    const opt = this.state.editorDraft.options.find(o => o.id === optId);
                    if (opt) {
                        opt.imageUrl = cdnUrl;
                        this.showToast('上传成功！');
                    }
                } catch (err) {
                    this.showToast('图片上传失败，请重试');
                } finally {
                    e.target.value = '';
                    this.state.uploadingMap[optId] = false;
                    this.state.uploadingOptId = null;
                    this.renderEditorForm();
                }
            },

            triggerImageUpload(optId) {
                this.state.uploadingOptId = optId;
                document.getElementById('image-upload-input').click();
            },

            async saveAndPublish() {
                if (Object.values(this.state.uploadingMap).some(v => v)) {
                    return this.showToast('图片正在上传中，请稍候再发布');
                }

                const type = this.state.editorDraft.type;

                if (type === 'live_polling') {
                    if (!this.state.editorDraft.title.trim()) return this.showToast('请输入投票主题');
                    if (this.state.editorDraft.options.some(o => !o.text.trim() && !o.imageUrl)) return this.showToast('选项至少需要文字或图片');
                    if (this.state.editorDraft.allowMultiple) {
                        if (this.state.editorDraft.maxSelections > this.state.editorDraft.options.length) {
                            this.state.editorDraft.maxSelections = this.state.editorDraft.options.length;
                        }
                    }
                } else if (type === 'word_cloud') {
                    if (!this.state.editorDraft.title.trim()) return this.showToast('请输入词云主题');
                } else if (type === 'qa') {
                    if (!this.state.editorDraft.title.trim()) return this.showToast('请输入问答主题');
                } else if (type === 'ranking') {
                    if (!this.state.editorDraft.title.trim()) return this.showToast('请输入主题');
                    if (!this.state.editorDraft.rankingConfig || !this.state.editorDraft.rankingConfig.items || this.state.editorDraft.rankingConfig.items.length < 2) {
                        return this.showToast('请至少添加2个选项');
                    }
                    const hasEmptyItem = this.state.editorDraft.rankingConfig.items.some(i => !i.text.trim());
                    if (hasEmptyItem) return this.showToast('请填写所有选项内容');
                }

                const qId = this.uid();
                const initResults = {};

                if (type === 'live_polling') {
                    this.state.editorDraft.options.forEach(o => initResults[o.id] = 0);
                    initResults.participantCount = 0;
                } else if (type === 'word_cloud') {
                    initResults.words = {};
                    initResults.participantCount = 0;
                } else if (type === 'qa') {
                    initResults.questions = [];
                    initResults.participantCount = 0;
                } else if (type === 'ranking') {
                    initResults.responses = [];
                    initResults.participantCount = 0;
                }

                const globalPayload = {
                    questionId: qId,
                    type: type,
                    config: JSON.parse(JSON.stringify(this.state.editorDraft)),
                    results: initResults
                };

                this.els.loading.classList.remove('hidden');
                this.els.loading.classList.add('flex');

                await StoreService.setGlobalData(qId, globalPayload);
                await StoreService.setQuestionId(qId);

                this.state.activeQuestionId = qId;
                await this.fetchDataAndRender();
                this.showToast('发布成功！');
            },

            renderViewerContent() {
                const config = this.state.config;
                if (!config) return;

                let html = '';
                let isEnded = false;
                if (config.deadline && new Date() > new Date(config.deadline)) isEnded = true;

                const qId = this.state.activeQuestionId || '';
                const parts = qId.split('_');
                const shortId = parts[0] || qId;
                const createTs = parts[1] ? parseInt(parts[1]) : null;
                const createTimeStr = createTs ? new Date(createTs).toLocaleString('zh-CN', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' }) : '';

                html += `<div class="flex justify-between items-start mb-3"><div class="text-xl font-bold text-gray-900 leading-tight">${config.title || '无标题互动'}</div><div class="text-[10px] text-gray-400 text-right shrink-0 ml-3 mt-1 leading-tight"><div>ID: ${shortId}</div>${createTimeStr ? `<div>创建时间: ${createTimeStr}</div>` : ''}</div></div>`;

                this.els.participantCount.textContent = this.state.results.participantCount || 0;

                if (config.type === 'live_polling') {
                    html += this.renderPollViewer(config, isEnded);
                } else if (config.type === 'word_cloud') {
                    html += this.renderWordCloudViewer(config, isEnded);
                } else if (config.type === 'qa') {
                    html += this.renderQASViewer(config, isEnded);
                } else if (config.type === 'ranking') {
                    html += this.renderRankingViewer(config, isEnded);
                } else {
                    html += `<div class="text-center text-gray-400 py-10 border border-dashed border-gray-300 rounded">当前题型的互动区域...</div>`;
                }

                this.els.viewerContent.innerHTML = html;
                
                const rankingList = document.getElementById('ranking-list');
                if (rankingList) {
                    this.initRankingDrag();
                }
            },

            renderHeaderTags(config, isEnded, typeLabel, color) {
                return `<div class="flex flex-wrap items-center gap-2 mb-6"><span class="inline-block px-2.5 py-0.5 ${color} rounded text-xs border shadow-sm">${typeLabel}</span>${config.deadline ? `<span class="inline-block px-2.5 py-0.5 bg-gray-50 text-gray-500 rounded text-xs border border-gray-200">截止至 ${config.deadline.replace('T', ' ')}</span>` : ''}${isEnded ? `<span class="inline-block px-2.5 py-0.5 bg-red-50 text-red-500 rounded text-xs border border-red-100 font-medium tracking-wide">已结束</span>` : ''}</div>`;
            },

            renderInputArea(inputHtml) {
                return `<div class="bg-white border border-gray-200 rounded-lg p-4 shadow-sm mt-4">${inputHtml}</div>`;
            },

            renderPollViewer(config, isEnded) {
                const isMulti = config.allowMultiple, maxSel = config.maxSelections || 2, minSel = config.minSelections || 1;
                const hasVoted = this.state.userState.hasParticipated;
                let html = this.renderHeaderTags(config, isEnded, isMulti ? `多选 (${minSel}-${maxSel}项)` : '单选', 'bg-blue-50 text-blue-600 border-blue-100');
                
                let totalVotes = 0;
                const dataEntries = config.options.map(opt => { const votes = this.state.results[opt.id] || 0; totalVotes += votes; return { id: opt.id, label: opt.text || '未命名选项', value: votes }; });
                const participantCount = this.state.results.participantCount != null ? this.state.results.participantCount : totalVotes;
                this.els.participantCount.textContent = participantCount;

                if ((hasVoted || isEnded) && totalVotes > 0) {
                    html += `<div class="mb-8 p-4 bg-gray-50/30 rounded-xl border border-gray-100"><div class="text-xs font-semibold text-gray-400 mb-4 uppercase tracking-wide">结果汇总</div><div class="flex flex-col gap-3">${dataEntries.map(entry => { const percent = Math.round((entry.value / totalVotes) * 100), isWinner = entry.value === Math.max(...dataEntries.map(e => e.value)); return `<div><div class="flex justify-between items-center mb-1"><span class="text-sm font-medium text-gray-700 truncate flex-1 mr-2">${entry.label}</span><span class="text-sm font-bold ${isWinner ? 'text-blue-600' : 'text-gray-500'} shrink-0">${entry.value} 票 (${percent}%)</span></div><div class="h-3 bg-gray-100 rounded-full overflow-hidden"><div class="h-full rounded-full transition-all duration-500" style="width: ${percent}%; background-color: ${this.getOptionColor(entry.id)};"></div></div></div>`; }).join('')}</div></div>`;
                }

                const layoutClass = config.layout === 'card' ? 'card-layout-grid' : 'flex flex-col gap-4';
                html += `<div class="${layoutClass}">`;
                config.options.forEach(opt => {
                    const votes = this.state.results[opt.id] || 0, percent = totalVotes === 0 ? 0 : Math.round((votes / totalVotes) * 100);
                    const isVoted = this.state.userState.votedOptions.includes(opt.id), isTempSelected = !this.state.userState.hasParticipated && this.state.tempSelectedOptions.includes(opt.id);
                    const indicatorClass = isMulti ? 'checkbox' : 'radio', containerClass = isVoted ? 'voted' : (isTempSelected ? 'selected-temp' : '');

                    if (config.layout === 'card') {
                        const fallbackBg = this.getOptionColor(opt.id), firstChar = opt.text ? opt.text.charAt(0) : '?';
                        html += `<div class="poll-card ${containerClass} ${isEnded && !isVoted ? 'opacity-60 grayscale-[20%] cursor-not-allowed' : ''}" onclick="App.handleOptionClick('${opt.id}')"><div class="poll-card-img-wrapper">${opt.imageUrl ? `<img src="${opt.imageUrl}" class="poll-card-img" /><button class="poll-preview-btn shadow-md" onclick="event.stopPropagation(); App.showImagePreview('${opt.imageUrl}')" title="查看大图"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0zM10 7v3m0 0v3m0-3h3m-3 0H7"></path></svg></button>` : `<div class="poll-card-fallback" style="background-color: ${fallbackBg}">${firstChar}</div>`}</div><div class="poll-card-content"><div class="flex items-center gap-2">${(!this.state.userState.hasParticipated && !isEnded) ? `<div class="poll-indicator shadow-inner shrink-0 ${indicatorClass}"></div>` : ''}<span class="font-medium text-gray-800 line-clamp-1 text-sm">${opt.text || '选项'}</span></div><div class="flex justify-between items-center mt-1"><span class="text-[10px] text-gray-500">${votes} 票</span><span class="text-[10px] font-bold text-blue-600">${percent}%</span></div><div class="poll-card-progress" style="width: ${percent}%"></div></div></div>`;
                    } else {
                        html += `<div class="poll-bar-container bg-gray-50/50 rounded-lg shadow-sm border ${containerClass} ${isEnded && !isVoted ? 'opacity-60 cursor-not-allowed grayscale-[20%]' : ''}" onclick="App.handleOptionClick('${opt.id}')"><div class="poll-bar-fill rounded-lg" style="width: ${percent}%"></div><div class="poll-bar-content relative z-10"><div class="flex items-center gap-3 w-3/4">${(!this.state.userState.hasParticipated && !isEnded) ? `<div class="poll-indicator shadow-inner ${indicatorClass}"></div>` : ''}${opt.imageUrl ? `<img src="${opt.imageUrl}" class="w-9 h-9 object-cover rounded shadow-sm border border-gray-200 bg-white shrink-0 preview-trigger" onclick="event.stopPropagation(); App.showImagePreview('${opt.imageUrl}')" />` : ''}<span class="font-medium text-gray-800 break-words line-clamp-2">${opt.text}</span></div><div class="flex flex-col items-end shrink-0 pl-2"><span class="text-sm font-medium text-gray-700 whitespace-nowrap">${votes} 票</span><span class="text-xs text-gray-400 whitespace-nowrap">${percent}%</span></div></div></div>`;
                    }
                });
                html += `</div>`;

                if (!this.state.userState.hasParticipated && !isEnded) {
                    const hasSelection = this.state.tempSelectedOptions.length > 0;
                    const btnLabel = isMulti ? `提交选定项 (${this.state.tempSelectedOptions.length})` : '确认提交';
                    html += `<div class="mt-8 flex justify-end border-t border-gray-100 pt-4"><button class="lark-btn lark-btn-primary shadow-md hover:shadow-lg transition-shadow !h-9 !px-6 ${!hasSelection ? 'opacity-50 cursor-not-allowed' : ''}" ${hasSelection ? '' : 'disabled'} onclick="App.submitVoteFromUI()">${btnLabel}</button></div>`;
                }
                return html;
            },

            renderWordCloudViewer(config, isEnded) {
                const words = this.state.results.words || {};
                const cfg = config.wordCloudConfig || { maxWords: 30, minWordLength: 1 };
                const minLen = cfg.minWordLength || 1;
                const userState = this.state.userState || {};
                const userWords = userState.submittedWords || [];
                
                const wordEntries = Object.entries(words).filter(([word]) => word.length >= minLen).sort((a, b) => b[1] - a[1]).slice(0, cfg.maxWords || 30);
                const maxCount = wordEntries.length > 0 ? wordEntries[0][1] : 1;
                
                let html = this.renderHeaderTags(config, isEnded, '头脑风暴', 'bg-purple-50 text-purple-600 border-purple-100');

                if (wordEntries.length > 0) {
                    const colors = ['#EF4444', '#F97316', '#EAB308', '#22C55E', '#06B6D4', '#3B82F6', '#8B5CF6', '#EC4899'];
                    html += `<div class="mb-8 p-6 bg-gray-50/30 rounded-xl border border-gray-100 min-h-[200px] flex flex-wrap items-center justify-center gap-3 overflow-hidden">${wordEntries.map(([word, count], i) => { const size = Math.max(0.8, Math.min(2.5, 0.8 + (count / maxCount) * 1.7)); return `<span style="font-size: ${size}rem; color: ${colors[i % colors.length]}; font-weight: ${600 + Math.floor((count / maxCount) * 400)}; opacity: ${0.7 + (count / maxCount) * 0.3}" class="transition-all hover:opacity-100 cursor-default">${word}</span>`; }).join('')}</div>`;
                } else {
                    html += `<div class="mb-8 p-8 bg-gray-50/30 rounded-xl border border-gray-100 min-h-[200px] flex items-center justify-center"><p class="text-gray-400 text-sm">等待同学提交关键词...</p></div>`;
                }

                if (!userState.hasParticipated && !isEnded) {
                    html += `<div class="bg-white border border-gray-200 rounded-lg p-4 shadow-sm"><div class="flex gap-2"><input type="text" id="word-input" class="lark-input flex-1" placeholder="输入关键词，按回车提交" value="${this.state.wordCloudInput || ''}" oninput="App.onWordInputChange(this.value)" onkeypress="if(event.key==='Enter')App.submitWord()"><button class="lark-btn lark-btn-primary !px-4" onclick="App.submitWord()">提交</button></div>${userWords.length ? `<div class="mt-2 flex flex-wrap gap-1">${userWords.map(w => `<span class="inline-flex items-center gap-1 px-2 py-0.5 bg-purple-50 text-purple-600 rounded text-xs">${w}<button onclick="App.removeWord('${w}')" class="hover:text-purple-800">×</button></span>`).join('')}</div>` : ''}</div>`;
                } else if (userState.hasParticipated && userWords.length > 0) {
                    html += `<div class="mt-4 p-3 bg-purple-50/50 rounded-lg"><p class="text-xs text-purple-600 mb-1">您提交的关键词：</p><div class="flex flex-wrap gap-1">${userWords.map(w => `<span class="inline-flex px-2 py-0.5 bg-purple-100 text-purple-700 rounded text-xs">${w}</span>`).join('')}</div></div>`;
                }
                return html;
            },

            async submitWord() {
                const input = document.getElementById('word-input');
                if (!input) return;
                const word = input.value.trim();
                if (!word) return;
                
                if (!this.state.userState.submittedWords) this.state.userState.submittedWords = [];
                if (this.state.userState.submittedWords.includes(word)) return this.showToast('这个词已经提交过了');
                
                this.state.userState.submittedWords.push(word);
                this.state.userState.hasParticipated = true;
                
                const qId = this.state.activeQuestionId;
                let privatePayload = {}; privatePayload[qId] = this.state.userState;
                await StoreService.setPrivateData(qId, privatePayload);
                
                const latestGlobal = await StoreService.getGlobalData(qId);
                if (latestGlobal) {
                    if (!latestGlobal.results.words) latestGlobal.results.words = {};
                    if (!latestGlobal.results.words[word]) latestGlobal.results.words[word] = 0;
                    latestGlobal.results.words[word]++;
                    latestGlobal.results.participantCount = (latestGlobal.results.participantCount || 0) + 1;
                    await StoreService.setGlobalData(qId, latestGlobal);
                }
                
                input.value = '';
                this.state.wordCloudInput = '';
                this.state.isUserTyping = false;
                if (this.state.typingTimer) clearTimeout(this.state.typingTimer);
                this.fetchDataAndRender();
                this.showToast('提交成功！');
            },

            onWordInputChange(value) {
                this.state.wordCloudInput = value;
                this.state.isUserTyping = value.length > 0;
                if (this.state.typingTimer) clearTimeout(this.state.typingTimer);
                if (value.length > 0) {
                    this.state.typingTimer = setTimeout(() => {
                        this.state.isUserTyping = false;
                    }, 2000);
                }
            },

            async removeWord(word) {
                if (!this.state.userState.submittedWords) return;
                const idx = this.state.userState.submittedWords.indexOf(word);
                if (idx > -1) {
                    this.state.userState.submittedWords.splice(idx, 1);
                    this.renderViewerContent();
                    const qId = this.state.activeQuestionId;
                    let privatePayload = {}; privatePayload[qId] = this.state.userState;
                    await StoreService.setPrivateData(qId, privatePayload);
                    this.fetchDataAndRender();
                }
            },

            renderQASViewer(config, isEnded) {
                const questions = this.state.results.questions || [];
                const cfg = config.qaConfig || { allowAnonymous: false, allowUpvote: true };
                const userState = this.state.userState || {};
                const sortedQuestions = [...questions].sort((a, b) => (b.upvotes || 0) - (a.upvotes || 0));
                
                let html = this.renderHeaderTags(config, isEnded, '讨论板', 'bg-green-50 text-green-600 border-green-100');

                if (sortedQuestions.length > 0) {
                    html += `<div class="mb-6 flex flex-col gap-3">${sortedQuestions.map(q => { const isUpvoted = userState.upvotedQuestions && userState.upvotedQuestions.includes(q.id); return `<div class="bg-white border border-gray-200 rounded-lg p-4 shadow-sm"><div class="flex items-start gap-3">${cfg.allowUpvote ? `<button class="flex flex-col items-center gap-1 p-1 min-w-[40px] ${isUpvoted ? 'text-blue-600' : 'text-gray-400 hover:text-blue-500'}" onclick="App.upvoteQuestion('${q.id}')"><svg class="w-5 h-5" fill="${isUpvoted ? 'currentColor' : 'none'}" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 10h4.764a2 2 0 011.789 2.894l-3.5 7A2 2 0 0115.263 21h-4.017c-.163 0-.326-.02-.485-.06L7 20m7-10V5a2 2 0 00-2-2h-.095c-.5 0-.905.405-.905.905 0 .714-.211 1.412-.608 2.006L7 11v9m7-10h-2M7 20H5a2 2 0 01-2-2v-6a2 2 0 012-2h2.5"></path></svg><span class="text-xs font-bold">${q.upvotes || 0}</span></button>` : ''}<div class="flex-1"><p class="text-sm font-medium text-gray-800">${q.text}</p><div class="mt-2 flex items-center gap-2 text-xs text-gray-400">${!cfg.allowAnonymous && q.author ? `<span>${q.author}</span>` : ''}<span>${new Date(q.timestamp).toLocaleString('zh-CN', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' })}</span></div></div></div></div>`; }).join('')}</div>`;
                } else {
                    html += `<div class="mb-6 p-8 bg-gray-50/30 rounded-xl border border-gray-100 min-h-[100px] flex items-center justify-center"><p class="text-gray-400 text-sm">还没有问题，快来提问吧！</p></div>`;
                }

                if (!userState.hasParticipated && !isEnded) {
                    html += `<div class="bg-white border border-gray-200 rounded-lg p-4 shadow-sm"><textarea id="question-input" class="lark-input !h-20 mb-2" placeholder="请输入您的问题..." oninput="App.onQuestionInputChange(this.value)">${this.state.questionInput || ''}</textarea><div class="flex justify-end"><button class="lark-btn lark-btn-primary !px-4" onclick="App.submitQuestion()">提交问题</button></div></div>`;
                }
                return html;
            },

            async submitQuestion() {
                const input = document.getElementById('question-input');
                if (!input) return;
                const text = input.value.trim();
                if (!text) return this.showToast('请输入问题内容');
                
                const cfg = this.state.config.qaConfig || {};
                const newQuestion = { id: `q_${Date.now()}`, text: text, author: cfg.allowAnonymous ? null : (window.lark?.user?.name || '匿名用户'), upvotes: 0, timestamp: Date.now() };
                
                if (!this.state.userState.submittedQuestions) this.state.userState.submittedQuestions = [];
                this.state.userState.submittedQuestions.push(newQuestion.id);
                this.state.userState.hasParticipated = true;
                
                const qId = this.state.activeQuestionId;
                let privatePayload = {}; privatePayload[qId] = this.state.userState;
                await StoreService.setPrivateData(qId, privatePayload);
                
                const latestGlobal = await StoreService.getGlobalData(qId);
                if (latestGlobal) {
                    if (!latestGlobal.results.questions) latestGlobal.results.questions = [];
                    latestGlobal.results.questions.push(newQuestion);
                    latestGlobal.results.participantCount = (latestGlobal.results.participantCount || 0) + 1;
                    await StoreService.setGlobalData(qId, latestGlobal);
                }
                input.value = '';
                this.state.questionInput = '';
                this.state.isUserTyping = false;
                if (this.state.typingTimer) clearTimeout(this.state.typingTimer);
                this.fetchDataAndRender();
                this.showToast('问题提交成功！');
            },

            onQuestionInputChange(value) {
                this.state.questionInput = value;
                this.state.isUserTyping = value.length > 0;
                if (this.state.typingTimer) clearTimeout(this.state.typingTimer);
                if (value.length > 0) {
                    this.state.typingTimer = setTimeout(() => {
                        this.state.isUserTyping = false;
                    }, 2000);
                }
            },

            async upvoteQuestion(questionId) {
                if (!this.state.userState.upvotedQuestions) this.state.userState.upvotedQuestions = [];
                if (this.state.userState.upvotedQuestions.includes(questionId)) return this.showToast('您已经点赞过这个问题了');
                
                this.state.userState.upvotedQuestions.push(questionId);
                this.renderViewerContent();
                
                const qId = this.state.activeQuestionId;
                let privatePayload = {}; privatePayload[qId] = this.state.userState;
                await StoreService.setPrivateData(qId, privatePayload);
                
                const latestGlobal = await StoreService.getGlobalData(qId);
                if (latestGlobal && latestGlobal.results.questions) {
                    const q = latestGlobal.results.questions.find(q => q.id === questionId);
                    if (q) { q.upvotes = (q.upvotes || 0) + 1; await StoreService.setGlobalData(qId, latestGlobal); }
                }
                this.fetchDataAndRender();
            },

            renderRankingViewer(config, isEnded) {
                const cfg = config.rankingConfig || { mode: 'ranking', scaleMin: 1, scaleMax: 5, items: [] };
                const mode = cfg.mode || 'ranking', items = cfg.items || [], userState = this.state.userState || {};
                const responses = this.state.results.responses || [];
                let html = this.renderHeaderTags(config, isEnded, mode === 'ranking' ? '排序' : '评分', 'bg-pink-50 text-pink-600 border-pink-100');

                if (userState.hasParticipated && userState.rankingAnswers) {
                    if (mode === 'ranking') {
                        const rankedItems = items.map((item, i) => ({ ...item, rank: userState.rankingAnswers[i] || (i + 1) })).sort((a, b) => a.rank - b.rank);
                        html += `<div class="mb-6 p-4 bg-gray-50/30 rounded-xl border border-gray-100"><div class="text-xs font-semibold text-gray-400 mb-3 uppercase tracking-wide">您的排序</div><div class="flex flex-col gap-2">${rankedItems.map(item => `<div class="flex items-center gap-3 bg-white border border-gray-200 rounded-lg p-3"><span class="w-6 h-6 flex items-center justify-center bg-blue-100 text-blue-600 rounded-full text-xs font-bold">${item.rank}</span><span class="flex-1 text-sm text-gray-700">${item.text}</span></div>`).join('')}</div></div>`;
                    } else {
                        html += `<div class="mb-6 p-4 bg-gray-50/30 rounded-xl border border-gray-100"><div class="text-xs font-semibold text-gray-400 mb-3 uppercase tracking-wide">您的评分</div><div class="flex flex-col gap-3">${items.map(item => { const score = userState.rankingAnswers?.[item.id] || 0; return `<div class="bg-white border border-gray-200 rounded-lg p-3"><div class="text-sm font-medium text-gray-700 mb-2">${item.text}</div><div class="flex items-center justify-between"><div class="flex gap-1">${Array.from({length: cfg.scaleMax || 5}, (_, s) => s + 1).map(s => `<span class="w-8 h-8 flex items-center justify-center rounded text-sm ${score >= s ? 'bg-blue-500 text-white' : 'bg-gray-100 text-gray-500'}">${s}</span>`).join('')}</div><span class="text-sm font-bold text-blue-600">${score}/${cfg.scaleMax || 5}</span></div></div>`; }).join('')}</div></div>`;
                    }
                } else if (!isEnded) {
                    if (mode === 'ranking') {
                        html += `<div class="mb-4 p-3 bg-blue-50 border border-blue-100 rounded-lg"><p class="text-xs text-blue-700">拖拽选项进行排序，最重要的排最前面</p></div><div class="flex flex-col gap-2 mb-6" id="ranking-list">${items.map((item, i) => `<div class="flex items-center gap-3 bg-white border border-gray-200 rounded-lg p-3 cursor-move shadow-sm hover:shadow-md transition-shadow" draggable="true" data-item-id="${item.id}" data-index="${i}"><svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8h16M4 16h16"></path></svg><span class="flex-1 text-sm text-gray-700">${item.text}</span><span class="w-6 h-6 flex items-center justify-center bg-gray-100 text-gray-500 rounded text-xs font-bold rank-num">${i + 1}</span></div>`).join('')}</div><div class="text-center"><button class="lark-btn lark-btn-primary !px-6" onclick="App.submitRanking()">提交排序</button></div>`;
                    } else {
                        html += `<div class="flex flex-col gap-4 mb-6" id="scale-list">${items.map(item => `<div class="bg-white border border-gray-200 rounded-lg p-4"><div class="text-sm font-medium text-gray-700 mb-3">${item.text}</div><div class="flex justify-between gap-1">${Array.from({length: cfg.scaleMax || 5}, (_, s) => s + 1).map(s => `<button class="scale-btn flex-1 h-10 rounded text-sm font-medium transition-all ${userState.tempScaleSelections?.[item.id] === s ? 'bg-blue-500 text-white' : 'bg-gray-100 text-gray-600 hover:bg-blue-50'}" data-item-id="${item.id}" data-score="${s}" onclick="App.selectScaleScore('${item.id}',${s})">${s}</button>`).join('')}</div>${cfg.scaleLabels?.[userState.tempScaleSelections?.[item.id]] ? `<div class="mt-2 text-xs text-center text-blue-600">${cfg.scaleLabels[userState.tempScaleSelections[item.id]]}</div>` : ''}</div>`).join('')}</div><div class="text-center"><button class="lark-btn lark-btn-primary !px-6" onclick="App.submitScale()">提交评分</button></div>`;
                    }
                }

                if (responses.length > 0) {
                    if (mode === 'ranking') {
                        const avgRanks = {}; items.forEach(item => avgRanks[item.id] = { text: item.text, sum: 0, count: 0 });
                        responses.forEach(r => { if (r.answers) r.answers.forEach((rank, idx) => { if (items[idx] && avgRanks[items[idx].id]) { avgRanks[items[idx].id].sum += rank; avgRanks[items[idx].id].count++; } }) });
                        const rankedItems = Object.values(avgRanks).map(item => ({ ...item, avg: item.count > 0 ? (item.sum / item.count).toFixed(1) : 0 })).sort((a, b) => a.avg - b.avg);
                        html += `<div class="mb-6 p-4 bg-gray-50/30 rounded-xl border border-gray-100"><div class="text-xs font-semibold text-gray-400 mb-3 uppercase tracking-wide">平均排序结果</div><div class="flex flex-col gap-2">${rankedItems.map((item, i) => `<div class="flex items-center gap-3 bg-white border border-gray-200 rounded-lg p-3"><span class="w-6 h-6 flex items-center justify-center bg-blue-100 text-blue-600 rounded-full text-xs font-bold">${i + 1}</span><span class="flex-1 text-sm text-gray-700">${item.text}</span><span class="text-xs text-gray-400">平均: ${item.avg}</span></div>`).join('')}</div></div>`;
                    } else {
                        const avgScores = {}; items.forEach(item => avgScores[item.id] = { text: item.text, sum: 0, count: 0 });
                        responses.forEach(r => { if (r.answers) Object.entries(r.answers).forEach(([itemId, score]) => { if (avgScores[itemId]) { avgScores[itemId].sum += score; avgScores[itemId].count++; } }) });
                        const sortedItems = Object.values(avgScores).map(item => ({ ...item, avg: item.count > 0 ? (item.sum / item.count).toFixed(1) : 0 })).sort((a, b) => parseFloat(b.avg) - parseFloat(a.avg));
                        html += `<div class="mb-6 p-4 bg-gray-50/30 rounded-xl border border-gray-100"><div class="text-xs font-semibold text-gray-400 mb-3 uppercase tracking-wide">平均评分结果</div><div class="flex flex-col gap-3">${sortedItems.map(item => { const avg = parseFloat(item.avg), percent = ((avg - (cfg.scaleMin || 1)) / ((cfg.scaleMax || 5) - (cfg.scaleMin || 1))) * 100; return `<div><div class="flex justify-between items-center mb-1"><span class="text-sm text-gray-700">${item.text}</span><span class="text-sm font-bold text-blue-600">${item.avg} 分</span></div><div class="h-2 bg-gray-100 rounded-full overflow-hidden"><div class="h-full bg-blue-500 rounded-full" style="width:${percent}%"></div></div></div>`; }).join('')}</div></div>`;
                    }
                }
                return html;
            },

            initRankingDrag() {
                const list = document.getElementById('ranking-list');
                if (!list) return;
                
                let draggedItem = null;
                const items = list.querySelectorAll('[draggable="true"]');
                
                items.forEach(item => {
                    // 优化：添加光标样式
                    item.style.cursor = 'grab';

                    item.addEventListener('dragstart', e => {
                        draggedItem = item;
                        e.dataTransfer.effectAllowed = 'move';
                        e.dataTransfer.setData('text/plain', item.dataset.itemId); // Firefox 需要
                        item.style.cursor = 'grabbing';
                        
                        // 延迟添加样式，避免拖拽影像也被透明化
                        requestAnimationFrame(() => {
                            item.classList.add('opacity-50', 'bg-blue-50', 'scale-[0.98]', 'shadow-lg');
                        });
                    });

                    item.addEventListener('dragend', () => {
                        if (draggedItem) {
                            draggedItem.classList.remove('opacity-50', 'bg-blue-50', 'scale-[0.98]', 'shadow-lg');
                            draggedItem.style.cursor = 'grab';
                            draggedItem = null;
                        }
                        App.updateRankingNumbers();
                    });

                    item.addEventListener('dragover', e => {
                        e.preventDefault(); // 允许 drop
                        e.dataTransfer.dropEffect = 'move';
                        
                        if (!draggedItem || draggedItem === item) return;

                        const rect = item.getBoundingClientRect();
                        const midY = rect.top + rect.height / 2;
                        
                        // 简单的防抖可以放在这里，但 DOM 操作通常足够快
                        // 如果鼠标在元素上半部分，且 draggedItem 不在 item 前面，则移到前面
                        if (e.clientY < midY) {
                            if (item.previousElementSibling !== draggedItem) {
                                item.parentNode.insertBefore(draggedItem, item);
                            }
                        } else {
                            // 如果鼠标在元素下半部分，且 draggedItem 不在 item 后面，则移到后面
                            if (item.nextElementSibling !== draggedItem) {
                                item.parentNode.insertBefore(draggedItem, item.nextSibling);
                            }
                        }
                    });

                    item.addEventListener('drop', e => {
                        e.preventDefault();
                    });
                    
                    // 恢复光标
                    item.addEventListener('mouseup', () => {
                        item.style.cursor = 'grab';
                    });
                });
            },

            updateRankingNumbers() {
                document.querySelectorAll('#ranking-list [draggable="true"]').forEach((item, i) => { const numEl = item.querySelector('.rank-num'); if (numEl) numEl.textContent = i + 1; });
            },

            async submitRanking() {
                const items = document.querySelectorAll('#ranking-list [draggable="true"]');
                // 修复：生成正确的排名数组，ranking[i] 表示原始列表第 i 个元素的排名
                const ranking = new Array(items.length);
                items.forEach((item, index) => {
                    const originalIdx = parseInt(item.dataset.index);
                    if (!isNaN(originalIdx)) {
                        ranking[originalIdx] = index + 1;
                    }
                });

                this.state.userState.hasParticipated = true;
                this.state.userState.rankingAnswers = ranking;
                this.renderViewerContent();
                const qId = this.state.activeQuestionId;
                let privatePayload = {}; privatePayload[qId] = this.state.userState;
                await StoreService.setPrivateData(qId, privatePayload);
                const latestGlobal = await StoreService.getGlobalData(qId);
                if (latestGlobal) {
                    if (!latestGlobal.results.responses) latestGlobal.results.responses = [];
                    latestGlobal.results.responses.push({ answers: ranking, timestamp: Date.now() });
                    latestGlobal.results.participantCount = (latestGlobal.results.participantCount || 0) + 1;
                    await StoreService.setGlobalData(qId, latestGlobal);
                }
                this.fetchDataAndRender();
                this.showToast('排序提交成功！');
            },

            selectScaleScore(itemId, score) {
                this.state.isSelectingScore = true;
                if (!this.state.userState.tempScaleSelections) this.state.userState.tempScaleSelections = {};
                this.state.userState.tempScaleSelections[itemId] = score;
                this.renderViewerContent();
                setTimeout(() => { this.state.isSelectingScore = false; }, 2000);
            },

            async submitScale() {
                const tempSelections = this.state.userState.tempScaleSelections || {};
                const cfg = this.state.config.rankingConfig || {};
                const items = cfg.items || [];
                const allAnswered = items.every(item => tempSelections[item.id] !== undefined);
                if (!allAnswered) return this.showToast('请完成所有项目的评分');
                this.state.isSelectingScore = false;
                this.state.userState.hasParticipated = true;
                this.state.userState.rankingAnswers = { ...tempSelections };
                delete this.state.userState.tempScaleSelections;
                this.renderViewerContent();
                const qId = this.state.activeQuestionId;
                let privatePayload = {}; privatePayload[qId] = this.state.userState;
                await StoreService.setPrivateData(qId, privatePayload);
                const latestGlobal = await StoreService.getGlobalData(qId);
                if (latestGlobal) {
                    if (!latestGlobal.results.responses) latestGlobal.results.responses = [];
                    latestGlobal.results.responses.push({ answers: { ...tempSelections }, timestamp: Date.now() });
                    latestGlobal.results.participantCount = (latestGlobal.results.participantCount || 0) + 1;
                    await StoreService.setGlobalData(qId, latestGlobal);
                }
                this.fetchDataAndRender();
                this.showToast('评分提交成功！');
            },

            handleOptionClick(optId) {
                const config = this.state.config;
                if (config.deadline && new Date() > new Date(config.deadline)) {
                    return this.showToast('该投票已结束！');
                }

                if (this.state.userState.hasParticipated) {
                    return this.showToast('您已经参与过啦！');
                }

                const isMulti = this.state.config.allowMultiple;
                const maxSel = isMulti ? (this.state.config.maxSelections || 2) : 1;

                const idx = this.state.tempSelectedOptions.indexOf(optId);
                if (idx > -1) {
                    // 单选：点击已选项不取消，多选才可反选
                    if (isMulti) {
                        this.state.tempSelectedOptions.splice(idx, 1);
                    }
                } else {
                    if (!isMulti) {
                        // 单选：直接替换
                        this.state.tempSelectedOptions = [optId];
                    } else {
                        if (this.state.tempSelectedOptions.length >= maxSel) {
                            return this.showToast(`最多只能选择 ${maxSel} 项`);
                        }
                        this.state.tempSelectedOptions.push(optId);
                    }
                }
                this.renderViewerContent();
            },

            submitVoteFromUI() {
                const isMulti = this.state.config.allowMultiple;
                const minSel = isMulti ? (this.state.config.minSelections || 1) : 1;
                if (this.state.tempSelectedOptions.length < minSel) {
                    return this.showToast(isMulti ? `请至少选择 ${minSel} 项` : '请先选择一个选项');
                }
                this.submitVote([...this.state.tempSelectedOptions]);
            },

            async submitVote(optIdsArray) {
                const qId = this.state.activeQuestionId;

                this.state.userState.hasParticipated = true;
                this.state.userState.votedOptions = optIdsArray;

                optIdsArray.forEach(optId => {
                    if (!this.state.results[optId]) this.state.results[optId] = 0;
                    this.state.results[optId]++;
                });

                this.state.tempSelectedOptions = [];
                this.renderViewerContent();

                let privatePayload = {};
                privatePayload[qId] = this.state.userState;
                await StoreService.setPrivateData(qId, privatePayload);

                const latestGlobal = await StoreService.getGlobalData(qId);
                if (latestGlobal) {
                    optIdsArray.forEach(optId => {
                        if (!latestGlobal.results[optId]) latestGlobal.results[optId] = 0;
                        latestGlobal.results[optId]++;
                    });
                    // 每次提交只算 1 人，不管多选几项
                    latestGlobal.results.participantCount = (latestGlobal.results.participantCount || 0) + 1;
                    await StoreService.setGlobalData(qId, latestGlobal);
                }

                this.fetchDataAndRender();
                this.showToast('提交成功！');
            },

            bindEvents() {
                document.getElementById('editor-tabs').addEventListener('click', (e) => {
                    if (e.target.classList.contains('editor-tab')) {
                        document.querySelectorAll('.editor-tab').forEach(t => {
                            t.classList.remove('active', 'text-blue-600', 'border-blue-600', 'font-medium');
                            t.classList.add('text-gray-500', 'border-transparent');
                        });
                        e.target.classList.remove('text-gray-500', 'border-transparent');
                        e.target.classList.add('active', 'text-blue-600', 'border-blue-600', 'font-medium');
                        this.state.editorDraft.type = e.target.getAttribute('data-type');
                        this.renderEditorForm();
                    }
                });

                document.getElementById('btn-save-publish').addEventListener('click', () => {
                    this.saveAndPublish();
                });

                document.getElementById('btn-refresh').addEventListener('click', () => {
                    this.fetchDataAndRender();
                    this.showToast('结果已刷新');
                });
            }
        };

        // 飞书动态注入脚本时 DOMContentLoaded 可能已触发，需兼容
        if (document.readyState === 'loading') {
            window.addEventListener('DOMContentLoaded', () => {
                App.init();
            });
        } else {
            App.init();
        }
    </script>
</body>
